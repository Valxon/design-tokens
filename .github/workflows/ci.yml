name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Regenerate preview
        run: npm run preview
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: docs/preview.html
          retention-days: 14
